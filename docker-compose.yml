version: "3.8"

services:
  yocto:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    privileged: true           # helpful for WIC/loop devices; remove if not needed
    shm_size: "2g"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - .:/workspaces/yocto-ppe-workspace
      - ./downloads:/downloads
      - ./sstate-cache:/sstate-cache
    environment:
      DL_DIR: /downloads
      SSTATE_DIR: /sstate-cache
      BB_NUMBER_THREADS: ${BB_NUMBER_THREADS:-8}
      PARALLEL_MAKE: ${PARALLEL_MAKE:--j8}
